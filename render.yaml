services:
  - type: web
    name: cv-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: cv-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cv-db
          property: port
      - key: DB_NAME
          fromDatabase:
          name: cv-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: cv-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cv-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://cv-frontend.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: cv-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: VITE_API_URL
        value: https://cv-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://cv-backend.onrender.com
      - key: PORT
        value: 5173